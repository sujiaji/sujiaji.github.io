<style>
  a_nav:link, a_nav:visited {
    background-color: white;
    color: #3c3535;
    padding: 14px 25px;
    text-align: center;
    text-decoration: none;
    display: inline-block;
  }
  
  a_nav:hover, a_nav:active {
    background-color: #3c3535;
  }
  </style>

<nav align="right">
    {% for item in site.data.navigation %}
      <a_nav href="{{ item.link }}">
        {{ item.name }}
      </a_nav>
    {% endfor %}
</nav>
